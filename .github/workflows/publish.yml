name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    name: Validate then publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      # ── Validation gate (same steps as ci.yml) ───────────────────────────
      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Test
        run: npx vitest run

      # ── Publish ──────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
