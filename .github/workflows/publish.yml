name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Validate then publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Bundle size
        run: npm run test:size

      - name: Package audit
        run: npm run test:package

      - name: Publish to npm
        run: npm publish --access public --provenance
