name: CI

on:
  push:
    branches: [master, rc]
  pull_request:
    branches: [master, rc]

jobs:
  ci:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --project tsconfig.build.json --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
